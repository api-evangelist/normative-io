aid: normative-io
name: Normative
description: >-
  Normative is a Stockholm, Sweden-based carbon accounting and ESG reporting
  software company helping enterprises measure, report, and reduce their
  greenhouse gas emissions across scopes 1, 2, and 3. Its platform combines a
  library of more than 349,000 region- and sector-specific emission factors
  with workflows for product carbon footprint (PCF), supply chain engagement,
  Science Based Targets initiative (SBTi) target setting, Corporate
  Sustainability Reporting Directive (CSRD) disclosure, and Carbon Border
  Adjustment Mechanism (CBAM) reporting. Calculations are built to the GHG
  Protocol and independently verified by TÜV SÜD against ISO/IEC 25051.
  Customers include Vodafone, Hertz, Hitachi Rail, and Flying Tiger Copenhagen,
  and every account is paired with a named, GHG Protocol-certified Climate
  Strategy Advisor rather than a traditional support helpdesk. The company's
  revenue model is enterprise SaaS subscriptions plus advisory services;
  Normative does not publish a public developer API, SDK, or open-source
  release, and its GitHub organization (normative-io) currently exposes no
  public repositories.
